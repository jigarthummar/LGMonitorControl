name: LGMonitorControl
options:
  bundleIdPrefix: com.jigarthummar
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: NO
targets:
  LGMonitorControl:
    type: application
    platform: macOS
    sources:
      - path: LGMonitorControl
    info:
      path: LGMonitorControl/Info.plist
      properties:
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundleDisplayName: LG Monitor Control
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSHumanReadableCopyright: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jigarthummar.LGMonitorControl
        ENABLE_APP_SANDBOX: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
